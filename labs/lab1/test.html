<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #1a1a1a; }
        #controls { 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            width: 600px; margin: 0 auto 20px auto; text-align: center;
        }
        .view-container { display: flex; justify-content: center; padding-bottom: 20px; }
        .chart-wrapper { 
            background: white; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            cursor: move; 
        }
        .fixation { fill: #ff4500; opacity: 0.6; stroke: #fff; stroke-width: 0.5px; }
        .path-line { fill: none; stroke: #4682b4; stroke-width: 1.5px; opacity: 0.4; }
        .axis-label { font-size: 14px; fill: #444; font-weight: bold; pointer-events: none; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Advanced Visual Data Analysis: Spatial Gaze Map</h2>
    
    <div id="controls">
        <label><strong>Time Progress:</strong> <span id="time-val">0</span> $ms$</label>
        <input type="range" id="time-slider">
        <p style="font-size: 12px; color: #666; margin-top: 5px;">
            Scroll to Zoom | Drag to Pan
        </p>
    </div>

    <div class="view-container">
        <div class="chart-wrapper" id="xy-view"></div>
    </div>

    <script>
        const margin = {top: 50, right: 50, bottom: 60, left: 80},
              size = 850, 
              innerWidth = size - margin.left - margin.right,
              innerHeight = size - margin.top - margin.bottom;

        let currentMaxTime = 0;

        d3.tsv("EyeTrack-raw.tsv").then(data => {
            data.forEach(d => {
                d.x = +d["GazePointX(px)"];
                d.y = +d["GazePointY(px)"];
                d.t = +d["RecordingTimestamp"];
                d.dur = +d["GazeEventDuration(mS)"];
            });

            const tExt = d3.extent(data, d => d.t);
            const xExt = d3.extent(data, d => d.x);
            const yExt = d3.extent(data, d => d.y);

            const xScale = d3.scaleLinear().domain(xExt).range([0, innerWidth]).nice();
            const yScale = d3.scaleLinear().domain(yExt).range([innerHeight, 0]).nice();

            d3.select("#time-slider")
                .attr("min", tExt[0]).attr("max", tExt[1])
                .attr("value", tExt[1])
                .on("input", function() { update(+this.value); });

            const svg = d3.select("#xy-view").append("svg")
                .attr("width", size).attr("height", size);
            
            const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            // Clip path to keep points within bounds during zoom
            svg.append("defs").append("clipPath").attr("id", "clip")
               .append("rect").attr("width", innerWidth).attr("height", innerHeight);

            const viewG = g.append("g").attr("clip-path", "url(#clip)");
            const pathEl = viewG.append("path").attr("class", "path-line");
            const dotsG = viewG.append("g");

            const xAxisG = g.append("g").attr("transform", `translate(0,${innerHeight})`);
            const yAxisG = g.append("g");
            
            // Labels
            g.append("text").attr("x", innerWidth/2).attr("y", -20).attr("text-anchor", "middle").style("font-size", "20px").style("font-weight", "bold").text("Spatial Distribution of Fixations");
            g.append("text").attr("x", innerWidth/2).attr("y", innerHeight + 45).attr("text-anchor", "middle").attr("class", "axis-label").text("X-Coordinate (Pixels)");
            g.append("text").attr("transform", "rotate(-90)").attr("y", -60).attr("x", -innerHeight/2).attr("text-anchor", "middle").attr("class", "axis-label").text("Y-Coordinate (Pixels)");

            const zoom = d3.zoom()
                .scaleExtent([0.1, 20])
                .on("zoom", (event) => render(event.transform));

            svg.call(zoom);

            function render(transform) {
                const newX = transform.rescaleX(xScale);
                const newY = transform.rescaleY(yScale);

                xAxisG.call(d3.axisBottom(newX));
                yAxisG.call(d3.axisLeft(newY));

                const filtered = data.filter(d => d.t <= currentMaxTime);
                
                pathEl.attr("d", d3.line().x(d => newX(d.x)).y(d => newY(d.y))(filtered));
                
                const circles = dotsG.selectAll("circle").data(filtered, d => d.FixationIndex);
                
                circles.enter().append("circle")
                    .attr("class", "fixation")
                    .attr("r", d => Math.sqrt(d.dur) / 1.2) // Scaled for better visibility
                    .merge(circles)
                    .attr("cx", d => newX(d.x))
                    .attr("cy", d => newY(d.y));

                circles.exit().remove();
            }

            function update(maxTime) {
                currentMaxTime = maxTime;
                d3.select("#time-val").text(maxTime);
                render(d3.zoomTransform(svg.node()));
            }

            update(tExt[1]);
        });
    </script>
</body>
</html>
